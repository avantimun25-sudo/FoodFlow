openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Food Delivery Admin & Restaurant Portal API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: auth
  - name: dashboard
  - name: orders
  - name: customers
  - name: restaurants
  - name: drivers
  - name: menu-items
  - name: payments
  - name: restaurant-requests
  - name: restaurant-portal

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Auth token + user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                required: [ok]

  /dashboard/stats:
    get:
      operationId: getDashboardStats
      tags: [dashboard]
      summary: Get dashboard overview stats
      responses:
        "200":
          description: Dashboard stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /dashboard/revenue-trend:
    get:
      operationId: getRevenueTrend
      tags: [dashboard]
      summary: Get daily revenue trend for last 30 days
      responses:
        "200":
          description: Revenue trend data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RevenueTrendPoint"

  /dashboard/order-status-distribution:
    get:
      operationId: getOrderStatusDistribution
      tags: [dashboard]
      summary: Get order count grouped by status
      responses:
        "200":
          description: Order status distribution
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StatusCount"

  /dashboard/top-restaurants:
    get:
      operationId: getTopRestaurants
      tags: [dashboard]
      summary: Get top restaurants by revenue
      responses:
        "200":
          description: Top restaurants
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RestaurantRevenue"

  /dashboard/orders-by-hour:
    get:
      operationId: getOrdersByHour
      tags: [dashboard]
      summary: Get orders grouped by hour of day
      responses:
        "200":
          description: Orders by hour
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/HourlyOrders"

  /orders:
    get:
      operationId: listOrders
      tags: [orders]
      parameters:
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: limit
          in: query
          schema: { type: integer, default: 20 }
        - name: status
          in: query
          schema: { type: string }
        - name: restaurantId
          in: query
          schema: { type: integer }
      responses:
        "200":
          description: Orders list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderListResponse"
    post:
      operationId: createOrder
      tags: [orders]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrderRequest"
      responses:
        "201":
          description: Created order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /orders/{id}:
    get:
      operationId: getOrder
      tags: [orders]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
    patch:
      operationId: updateOrderStatus
      tags: [orders]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateOrderStatusRequest"
      responses:
        "200":
          description: Updated order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
    delete:
      operationId: deleteOrder
      tags: [orders]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "204":
          description: Deleted

  /customers:
    get:
      operationId: listCustomers
      tags: [customers]
      parameters:
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: limit
          in: query
          schema: { type: integer, default: 20 }
        - name: search
          in: query
          schema: { type: string }
      responses:
        "200":
          description: Customers list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomerListResponse"
    post:
      operationId: createCustomer
      tags: [customers]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCustomerRequest"
      responses:
        "201":
          description: Created customer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"

  /customers/{id}:
    get:
      operationId: getCustomer
      tags: [customers]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Customer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"
    patch:
      operationId: updateCustomer
      tags: [customers]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCustomerRequest"
      responses:
        "200":
          description: Updated customer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"
    delete:
      operationId: deleteCustomer
      tags: [customers]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "204":
          description: Deleted

  /restaurants:
    get:
      operationId: listRestaurants
      tags: [restaurants]
      parameters:
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: limit
          in: query
          schema: { type: integer, default: 20 }
        - name: search
          in: query
          schema: { type: string }
      responses:
        "200":
          description: Restaurants list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RestaurantListResponse"
    post:
      operationId: createRestaurant
      tags: [restaurants]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRestaurantRequest"
      responses:
        "201":
          description: Created restaurant
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Restaurant"

  /restaurants/{id}:
    get:
      operationId: getRestaurant
      tags: [restaurants]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Restaurant
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Restaurant"
    patch:
      operationId: updateRestaurant
      tags: [restaurants]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateRestaurantRequest"
      responses:
        "200":
          description: Updated restaurant
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Restaurant"
    delete:
      operationId: deleteRestaurant
      tags: [restaurants]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "204":
          description: Deleted

  /drivers:
    get:
      operationId: listDrivers
      tags: [drivers]
      parameters:
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: limit
          in: query
          schema: { type: integer, default: 20 }
        - name: status
          in: query
          schema: { type: string }
      responses:
        "200":
          description: Drivers list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DriverListResponse"
    post:
      operationId: createDriver
      tags: [drivers]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDriverRequest"
      responses:
        "201":
          description: Created driver
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Driver"

  /drivers/{id}:
    get:
      operationId: getDriver
      tags: [drivers]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Driver
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Driver"
    patch:
      operationId: updateDriver
      tags: [drivers]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateDriverRequest"
      responses:
        "200":
          description: Updated driver
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Driver"
    delete:
      operationId: deleteDriver
      tags: [drivers]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "204":
          description: Deleted

  /menu-items:
    get:
      operationId: listMenuItems
      tags: [menu-items]
      parameters:
        - name: restaurantId
          in: query
          schema: { type: integer }
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: limit
          in: query
          schema: { type: integer, default: 20 }
      responses:
        "200":
          description: Menu items list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MenuItemListResponse"
    post:
      operationId: createMenuItem
      tags: [menu-items]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMenuItemRequest"
      responses:
        "201":
          description: Created menu item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MenuItem"

  /menu-items/{id}:
    patch:
      operationId: updateMenuItem
      tags: [menu-items]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMenuItemRequest"
      responses:
        "200":
          description: Updated menu item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MenuItem"
    delete:
      operationId: deleteMenuItem
      tags: [menu-items]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "204":
          description: Deleted

  /payments:
    get:
      operationId: listPayments
      tags: [payments]
      parameters:
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: limit
          in: query
          schema: { type: integer, default: 20 }
        - name: status
          in: query
          schema: { type: string }
      responses:
        "200":
          description: Payments list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentListResponse"

  /restaurant-requests:
    get:
      operationId: listRestaurantRequests
      tags: [restaurant-requests]
      summary: List restaurant registration requests (admin only)
      parameters:
        - name: status
          in: query
          schema: { type: string }
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: limit
          in: query
          schema: { type: integer, default: 20 }
      responses:
        "200":
          description: Restaurant requests
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RestaurantRequestListResponse"
    post:
      operationId: submitRestaurantRequest
      tags: [restaurant-requests]
      summary: Submit a new restaurant registration request (public)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRestaurantRequestBody"
      responses:
        "201":
          description: Submitted request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RestaurantRequest"

  /restaurant-requests/{id}:
    patch:
      operationId: reviewRestaurantRequest
      tags: [restaurant-requests]
      summary: Approve or decline a restaurant request (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReviewRestaurantRequestBody"
      responses:
        "200":
          description: Updated request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RestaurantRequest"

  /restaurant/profile:
    get:
      operationId: getRestaurantProfile
      tags: [restaurant-portal]
      summary: Get own restaurant profile
      responses:
        "200":
          description: Restaurant profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Restaurant"

  /restaurant/dashboard:
    get:
      operationId: getRestaurantDashboard
      tags: [restaurant-portal]
      summary: Get restaurant dashboard stats
      responses:
        "200":
          description: Restaurant dashboard
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RestaurantDashboardStats"

  /restaurant/orders:
    get:
      operationId: listRestaurantOrders
      tags: [restaurant-portal]
      summary: List orders for own restaurant
      parameters:
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: limit
          in: query
          schema: { type: integer, default: 20 }
        - name: status
          in: query
          schema: { type: string }
      responses:
        "200":
          description: Restaurant orders
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderListResponse"

  /restaurant/orders/{id}/status:
    patch:
      operationId: updateRestaurantOrderStatus
      tags: [restaurant-portal]
      summary: Update order status (restaurant only)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateOrderStatusRequest"
      responses:
        "200":
          description: Updated order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /restaurant/customers:
    get:
      operationId: listRestaurantCustomers
      tags: [restaurant-portal]
      summary: List customers who ordered from own restaurant
      parameters:
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: limit
          in: query
          schema: { type: integer, default: 20 }
      responses:
        "200":
          description: Restaurant customers
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RestaurantCustomerListResponse"

  /restaurant/menu:
    get:
      operationId: listRestaurantMenu
      tags: [restaurant-portal]
      summary: List own restaurant menu items
      parameters:
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: limit
          in: query
          schema: { type: integer, default: 20 }
      responses:
        "200":
          description: Restaurant menu
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MenuItemListResponse"
    post:
      operationId: createRestaurantMenuItem
      tags: [restaurant-portal]
      summary: Add a menu item to own restaurant
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRestaurantMenuItemRequest"
      responses:
        "201":
          description: Created menu item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MenuItem"

  /restaurant/menu/{id}:
    patch:
      operationId: updateRestaurantMenuItem
      tags: [restaurant-portal]
      summary: Update a menu item (own restaurant only)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateRestaurantMenuItemRequest"
      responses:
        "200":
          description: Updated menu item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MenuItem"
    delete:
      operationId: deleteRestaurantMenuItem
      tags: [restaurant-portal]
      summary: Delete a menu item (own restaurant only)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "204":
          description: Deleted

  /restaurant/revenue-trend:
    get:
      operationId: getRestaurantRevenueTrend
      tags: [restaurant-portal]
      summary: Revenue trend for own restaurant (30 days)
      responses:
        "200":
          description: Revenue trend
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RevenueTrendPoint"

  # ─── Delivery (Customer) paths ──────────────────────────────────────────────
  /delivery/register:
    post:
      operationId: customerRegister
      tags: [delivery]
      summary: Register as a customer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CustomerRegisterRequest"
      responses:
        "200":
          description: Customer registered and authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomerAuthResponse"

  /delivery/login:
    post:
      operationId: customerLogin
      tags: [delivery]
      summary: Customer login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Auth token + customer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomerAuthResponse"

  /delivery/restaurants:
    get:
      operationId: getDeliveryRestaurants
      tags: [delivery]
      summary: List active restaurants for delivery
      parameters:
        - in: query
          name: search
          schema: { type: string }
        - in: query
          name: cuisine
          schema: { type: string }
      responses:
        "200":
          description: Restaurant list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeliveryRestaurantList"

  /delivery/restaurants/{id}/menu:
    get:
      operationId: getDeliveryRestaurantMenu
      tags: [delivery]
      summary: Get restaurant details and menu items
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Restaurant with menu
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeliveryMenuResponse"

  /delivery/orders:
    get:
      operationId: getMyOrders
      tags: [delivery]
      summary: Get my orders (customer)
      responses:
        "200":
          description: My orders
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeliveryOrderList"
    post:
      operationId: placeOrder
      tags: [delivery]
      summary: Place a new order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlaceOrderRequest"
      responses:
        "200":
          description: Order placed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeliveryOrder"

  /delivery/orders/{id}:
    get:
      operationId: getMyOrder
      tags: [delivery]
      summary: Get a specific order
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Order details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeliveryOrder"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status: { type: string }
      required: [status]

    LoginRequest:
      type: object
      properties:
        email: { type: string }
        password: { type: string }
      required: [email, password]

    AuthUser:
      type: object
      properties:
        id: { type: integer }
        email: { type: string }
        role: { type: string }
        restaurantId:
          type: integer
          nullable: true
        restaurantName:
          type: string
          nullable: true
      required: [id, email, role]

    AuthResponse:
      type: object
      properties:
        token: { type: string }
        user:
          $ref: "#/components/schemas/AuthUser"
      required: [token, user]

    DashboardStats:
      type: object
      properties:
        totalRevenue: { type: number }
        totalOrders: { type: integer }
        totalCustomers: { type: integer }
        totalRestaurants: { type: integer }
        totalDrivers: { type: integer }
        activeOrders: { type: integer }
        avgOrderValue: { type: number }
        revenueGrowth: { type: number }
        ordersGrowth: { type: number }
        customersGrowth: { type: number }
      required: [totalRevenue, totalOrders, totalCustomers, totalRestaurants, totalDrivers, activeOrders, avgOrderValue, revenueGrowth, ordersGrowth, customersGrowth]

    RestaurantDashboardStats:
      type: object
      properties:
        totalRevenue: { type: number }
        totalOrders: { type: integer }
        totalCustomers: { type: integer }
        totalMenuItems: { type: integer }
        activeOrders: { type: integer }
        avgOrderValue: { type: number }
        rating:
          type: number
          nullable: true
        revenueGrowth: { type: number }
        ordersGrowth: { type: number }
      required: [totalRevenue, totalOrders, totalCustomers, totalMenuItems, activeOrders, avgOrderValue, revenueGrowth, ordersGrowth]

    RevenueTrendPoint:
      type: object
      properties:
        date: { type: string }
        revenue: { type: number }
        orders: { type: integer }
      required: [date, revenue, orders]

    StatusCount:
      type: object
      properties:
        status: { type: string }
        count: { type: integer }
      required: [status, count]

    RestaurantRevenue:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        revenue: { type: number }
        orders: { type: integer }
      required: [id, name, revenue, orders]

    HourlyOrders:
      type: object
      properties:
        hour: { type: integer }
        orders: { type: integer }
      required: [hour, orders]

    Order:
      type: object
      properties:
        id: { type: integer }
        customerId: { type: integer }
        restaurantId: { type: integer }
        driverId: { type: integer, nullable: true }
        status: { type: string }
        totalAmount: { type: number }
        deliveryAddress: { type: string }
        notes: { type: string, nullable: true }
        createdAt: { type: string }
        updatedAt: { type: string }
