kind = "web"
previewPath = "/"
title = "Food Delivery Admin Dashboard"
version = "1.0.0"
id = "artifacts/food-admin"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18548

[services.development]
run = "pnpm --filter @workspace/food-admin run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/food-admin", "run", "build" ]
publicDir = "artifacts/food-admin/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18548"
BASE_PATH = "/"
